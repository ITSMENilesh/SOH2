<!DOCTYPE html>
<html>
<head>
<title>Preview Queries</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
<h2>Student Helpdesk</h2>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="submit_query.html">Submit Query</a>
<a href="solution.html">Solution Status</a>
</div>
</div>

<div class="table-container">

<h2>Submitted Queries</h2>

<table id="previewTable">
<tr>
  <th>Name</th>
  <th>ID</th>
  <th>Issue</th>
  <th>Status</th>
</tr>
</table>

</div>

<div class="footer">
<p>Student Online Helpdesk System</p>
</div>

<script>
async function loadPreview(){
  let res = await fetch("http://localhost:5000/queries");
  let data = await res.json();

  let table = document.getElementById("previewTable");

  data.forEach(q => {
    let row = table.insertRow();

    row.innerHTML = `
      <td>${q.name}</td>
      <td>${q.studentId}</td>
      <td>${q.issueType}</td>
      <td class="${q.status === 'Solved' ? 'solved' : 'pending'}">
        ${q.status}
      </td>
    `;
  });
}

loadPreview();
</script>
</body>
</html>
